name: Build Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.changes.outputs.src }}
    steps:
      - name: Detect relevant changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'src/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.github/workflows/build-check.yml'

  setup-build-test:
    needs: filter
    if: github.event_name != 'pull_request' || needs.filter.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./src/WebApi"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/WebApi/go.mod
          cache-dependency-path: src/WebApi/go.sum

      - name: Build the application
        run: |
          go build -o rinha2-back-end-go .

  container-test:
    needs: [filter, setup-build-test]
    if: github.event_name != 'pull_request' || needs.filter.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: docker compose -f ./docker-compose.yml up nginx --wait

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f ./docker-compose.yml logs db

      - name: Test Healthcheck Endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/healthz)
          if [ "$STATUS" -eq 200 ]; then
            echo "Healthcheck passed with status $STATUS"
          else
            echo "Healthcheck failed with status $STATUS"
            exit 1
          fi
